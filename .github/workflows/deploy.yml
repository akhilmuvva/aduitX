name: Decentralized Automated Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-4everland:
    name: Deploy to 4EVERLAND
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 4EVERLAND Deploy Hook
        env:
          FOUR_EVER_LAND_HOOK: ${{ secrets.FOUR_EVER_LAND_WEBHOOK_URL }}
        run: |
          if [ -z "$FOUR_EVER_LAND_HOOK" ]; then
            echo "❌ Error: FOUR_EVER_LAND_WEBHOOK_URL secret is not configured in GitHub Repository secrets."
            echo "Please go to Settings -> Secrets and variables -> Actions and add your 4EVERLAND Deploy Hook URL."
            exit 1
          fi
          echo "🚀 Triggering automated 4EVERLAND decentralized compilation & deployment..."
          curl -s -X POST "$FOUR_EVER_LAND_HOOK"
          echo -e "\n✅ Webhook successfully triggered! Check your 4EVERLAND hosting dashboard to monitor the build."
